<TITLE>GIF ギャラリー</TITLE>
<style>
.popup { position: relative; display: inline-block; vertical-align: top; }
.popup .man {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%) translateY(0);
    opacity: 0;
    transition: transform 0.4s ease-out, opacity 0.3s;
    pointer-events: none;
    z-index: 10;
}
.popup:hover .man { transform: translateX(-50%) translateY(-60px); opacity: 1; }

dl dt { margin-bottom: 1.5em; }

/* 写真・描画系：縮小して表示 */
.full { display: block; max-width: 320px; height: auto; background: white; }

/* 地図系：縮小せず左上を切り抜いて表示 */
.map-clip {
    display: block;
    width: 215px;
    height: 140px;
    overflow: hidden;
    background: white;
}
.map-clip img {
    max-width: none;
    width: auto;
    height: auto;
}
</style>
