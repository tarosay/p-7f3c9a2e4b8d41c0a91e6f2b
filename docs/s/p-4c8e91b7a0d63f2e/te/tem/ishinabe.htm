<H1><center>石頭火鍋の作り方</center></H1>
<HR>

<h2>

<dl>
	<dt>
	<IMG SRC="ishina1.jpg" align="left">石鍋に胡麻油を入れて、良く加熱します。<br clear="all">
	<br>

	<dt>
	<IMG SRC="ishina2.jpg" align="left">鍋の回りに油跳ねガードを立て、肉、イカ等を入れ、軽く炒めます。<br clear="all">
	<br>

	<dt>
	<IMG SRC="ishina3.jpg" align="left">炒めた具を、一度取り出します。<br clear="all">
	<br>

	<dt>
	<IMG SRC="ishina4.jpg" align="left">鍋の中に特製のダシと豆腐、野菜、魚等の具を入れ、先ほど取り出した肉を上にのせて、後は煮込めばできあがりです。<br clear="all">
	<br>

	<dt>
	　ちょっと、オイリーですが、なかなか美味です。鍋の後の雑炊も最高です。<br>
	　この鍋は有名で、テレビや雑誌でも紹介されています。<br>

</dl>
</h2>
